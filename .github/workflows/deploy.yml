name: Deploy to AWS ECS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          docker build -t food-rescue-optimizer .
          docker tag food-rescue-optimizer:latest 749185461205.dkr.ecr.us-east-1.amazonaws.com/food-rescue-optimizer:latest
          docker push 749185461205.dkr.ecr.us-east-1.amazonaws.com/food-rescue-optimizer:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster food-rescue-cluster --service food-rescue-service --force-new-deployment --region us-east-1